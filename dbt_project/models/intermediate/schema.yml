version: 2

models:
  - name: int_raw_data
    description: >
      Intermediate customer data.
      Renames signup_date to registered_at.
      Adds a literal status column ('ACTIVE' for all rows).
      Source: stg_users.
    columns:
      - name: id
        description: "Unique customer identifier (Primary Key)"
        data_type: INTEGER
        tests:
          - unique
          - not_null
      - name: name
        description: "Customer full name"
        data_type: VARCHAR
        tests:
          - not_null
      - name: email
        description: "Customer email address (unique per customer)"
        data_type: VARCHAR
        tests:
          - unique
          - not_null
      - name: registered_at
        description: "Date the customer signed up (renamed from signup_date)"
        data_type: DATE
        tests:
          - not_null
      - name: plan_type
        description: "Subscription tier: basic, premium, or enterprise"
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              values: ['basic', 'premium', 'enterprise']
      - name: amount
        description: "Subscription amount in USD"
        data_type: "DECIMAL(10,2)"
        tests:
          - not_null
      - name: status
        description: "Customer status (literal 'ACTIVE' for all rows)"
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              values: ['ACTIVE']
      - name: processed_at
        description: "Timestamp when dbt processed this row (inherited from stg_users)"
        data_type: TIMESTAMP
        tests:
          - not_null

  - name: int_plans
    description: >
      Intermediate plan-enriched customer data.
      Joins stg_users to stg_plans on plan_type.
      Adds discount_amount as stg_users.amount * 0.20.
      Adds customer_tier: 'high_value' when amount >= 100, else 'standard'.
      Adds price_group: 'less than 30' when amount < 30, 'greater than 200' when amount > 200, else 'standard'.
      Filter: Excludes rows where discount_amount is 0 or NULL.
      Source: stg_users JOIN stg_plans ON plan_type.
    columns:
      - name: id
        description: "Unique customer identifier (Primary Key, from stg_users)"
        data_type: INTEGER
        tests:
          - unique
          - not_null
      - name: name
        description: "Customer full name"
        data_type: VARCHAR
        tests:
          - not_null
      - name: email
        description: "Customer email address"
        data_type: VARCHAR
        tests:
          - not_null
      - name: plan_type
        description: "Subscription tier: basic, premium, or enterprise"
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              values: ['basic', 'premium', 'enterprise']
      - name: amount
        description: "Customer subscription amount in USD (from stg_users)"
        data_type: "DECIMAL(10,2)"
        tests:
          - not_null
      - name: benefit
        description: "Plan benefit description (from stg_plans)"
        data_type: VARCHAR
        tests:
          - not_null
      - name: discount_amount
        description: "20% discount on customer amount (stg_users.amount * 0.20)"
        data_type: "DECIMAL(10,2)"
        tests:
          - not_null
      - name: customer_tier
        description: "Customer value tier: 'high_value' if amount >= 100, else 'standard'"
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              values: ['high_value', 'standard']
      - name: price_group
        description: >
          Price classification based on plan amount.
          'less than 30' when amount < 30.
          'greater than 200' when amount > 200.
          'standard' for all other amounts (>= 30 AND <= 200).
          See ACTIVE_ASSUMPTIONS.md A1 and A2 for TPM-approved logic.
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              values: ['less than 30', 'standard', 'greater than 200']
      - name: processed_at
        description: "Timestamp when dbt processed this row (inherited from stg_users)"
        data_type: TIMESTAMP
        tests:
          - not_null

  - name: int_plan_features
    description: >
      Intermediate plan feature matrix.
      Joins stg_plans to stg_benefit_features on benefit.
      Enriches plans with feature flags and total feature count.
      Source: stg_plans JOIN stg_benefit_features ON benefit.
    columns:
      - name: plan_type
        description: "Subscription tier identifier (Primary Key): basic, premium, or enterprise"
        data_type: VARCHAR
        tests:
          - unique
          - not_null
          - accepted_values:
              values: ['basic', 'premium', 'enterprise']
      - name: amount
        description: "Plan list price in USD"
        data_type: "DECIMAL(10,2)"
        tests:
          - not_null
      - name: benefit
        description: "Plan benefit description"
        data_type: VARCHAR
        tests:
          - not_null
      - name: email_support
        description: "Whether email support is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: live_chat
        description: "Whether live chat is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: phone_support
        description: "Whether phone support is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: api_access
        description: "Whether API access is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: custom_integrations
        description: "Whether custom integrations are included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: sla_guarantee
        description: "Whether SLA guarantee is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: total_features
        description: "Count of enabled features (from stg_benefit_features)"
        data_type: INTEGER
        tests:
          - not_null
      - name: processed_at
        description: "Timestamp when dbt processed this row (inherited from stg_plans)"
        data_type: TIMESTAMP
        tests:
          - not_null

  - name: int_user_stats
    description: >
      Intermediate user statistics aggregation.
      Combines user data with usage hours, phone calls, and enterprise status.
      Joins stg_users (base) with aggregated usage_hours, phone_log, and enterprise_accounts.
      Source: stg_users LEFT JOIN usage_hours, phone_log, enterprise_accounts.
    columns:
      - name: id
        description: "Unique user identifier (Primary Key, from stg_users)"
        data_type: INTEGER
        tests:
          - unique
          - not_null
      - name: name
        description: "Customer full name"
        data_type: VARCHAR
        tests:
          - not_null
      - name: email
        description: "Customer email address"
        data_type: VARCHAR
        tests:
          - not_null
      - name: plan_type
        description: "Subscription tier: basic, premium, or enterprise"
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              values: ['basic', 'premium', 'enterprise']
      - name: total_usage_hours
        description: "Sum of all usage hours for this user (NULL if no usage data)"
        data_type: "DECIMAL(10,2)"
      - name: total_phone_calls
        description: "Count of all phone calls for this user (0 if no calls)"
        data_type: INTEGER
        tests:
          - not_null
      - name: is_high_value_enterprise
        description: "TRUE if enterprise customer with contract_value_usd > 60000, else FALSE"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: processed_at
        description: "Timestamp when dbt processed this row"
        data_type: TIMESTAMP
        tests:
          - not_null

  - name: user_summary
    description: >
      Final user summary model with comprehensive user analytics.
      Source: int_user_stats with additional computed columns.
    columns:
      - name: id
        description: "Unique user identifier (Primary Key)"
        data_type: INTEGER
        tests:
          - unique
          - not_null
      - name: name
        description: "Customer full name"
        data_type: VARCHAR
        tests:
          - not_null
      - name: email
        description: "Customer email address"
        data_type: VARCHAR
        tests:
          - not_null
      - name: plan_type
        description: "Subscription tier: basic, premium, or enterprise"
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              values: ['basic', 'premium', 'enterprise']
      - name: total_usage_hours
        description: "Sum of all usage hours for this user"
        data_type: "DECIMAL(10,2)"
      - name: total_phone_calls
        description: "Count of all phone calls for this user"
        data_type: INTEGER
        tests:
          - not_null
      - name: is_high_value_enterprise
        description: "TRUE if enterprise customer with contract_value_usd > 60000"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: is_enterprise
        description: "TRUE if plan_type = 'enterprise', else FALSE"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: processed_at
        description: "Timestamp when dbt processed this row"
        data_type: TIMESTAMP
        tests:
          - not_null