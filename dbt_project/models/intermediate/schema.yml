version: 2

models:
  - name: int_raw_data
    description: >
      Intermediate customer data.
      Renames signup_date to registered_at.
      Adds a literal status column ('ACTIVE' for all rows).
      Source: stg_raw_data.
    columns:
      - name: id
        description: "Unique customer identifier (Primary Key)"
        data_type: INTEGER
        tests:
          - unique
          - not_null
      - name: name
        description: "Customer full name"
        data_type: VARCHAR
        tests:
          - not_null
      - name: email
        description: "Customer email address (unique per customer)"
        data_type: VARCHAR
        tests:
          - unique
          - not_null
      - name: registered_at
        description: "Date the customer signed up (renamed from signup_date)"
        data_type: DATE
        tests:
          - not_null
      - name: plan_type
        description: "Subscription tier: basic, premium, or enterprise"
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              values: ['basic', 'premium', 'enterprise']
      - name: amount
        description: "Subscription amount in USD"
        data_type: "DECIMAL(10,2)"
        tests:
          - not_null
      - name: status
        description: "Customer status (literal 'ACTIVE' for all rows)"
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              values: ['ACTIVE']
      - name: processed_at
        description: "Timestamp when dbt processed this row (inherited from stg_raw_data)"
        data_type: TIMESTAMP
        tests:
          - not_null

  - name: int_plans
    description: >
      Intermediate plan-enriched customer data.
      Joins stg_raw_data to stg_plans on plan_type.
      Adds discount_amount as stg_raw_data.amount * 0.20.
      Adds customer_tier: 'high_value' when amount >= 100, else 'standard'.
      Filter: Excludes rows where discount_amount is 0 or NULL.
      Source: stg_raw_data JOIN stg_plans ON plan_type.
    columns:
      - name: id
        description: "Unique customer identifier (Primary Key, from stg_raw_data)"
        data_type: INTEGER
        tests:
          - unique
          - not_null
      - name: name
        description: "Customer full name"
        data_type: VARCHAR
        tests:
          - not_null
      - name: email
        description: "Customer email address"
        data_type: VARCHAR
        tests:
          - not_null
      - name: plan_type
        description: "Subscription tier: basic, premium, or enterprise"
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              values: ['basic', 'premium', 'enterprise']
      - name: amount
        description: "Customer subscription amount in USD (from stg_raw_data)"
        data_type: "DECIMAL(10,2)"
        tests:
          - not_null
      - name: benefit
        description: "Plan benefit description (from stg_plans)"
        data_type: VARCHAR
        tests:
          - not_null
      - name: discount_amount
        description: "20% discount on customer amount (stg_raw_data.amount * 0.20)"
        data_type: "DECIMAL(10,2)"
        tests:
          - not_null
      - name: customer_tier
        description: "Customer value tier: 'high_value' if amount >= 100, else 'standard'"
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              values: ['high_value', 'standard']
      - name: processed_at
        description: "Timestamp when dbt processed this row (inherited from stg_raw_data)"
        data_type: TIMESTAMP
        tests:
          - not_null

  - name: int_plan_features
    description: >
      Intermediate plan feature matrix.
      Joins stg_plans to stg_benefit_features on benefit.
      Enriches plans with feature flags and total feature count.
      Source: stg_plans JOIN stg_benefit_features ON benefit.
    columns:
      - name: plan_type
        description: "Subscription tier identifier (Primary Key): basic, premium, or enterprise"
        data_type: VARCHAR
        tests:
          - unique
          - not_null
          - accepted_values:
              values: ['basic', 'premium', 'enterprise']
      - name: amount
        description: "Plan list price in USD"
        data_type: "DECIMAL(10,2)"
        tests:
          - not_null
      - name: benefit
        description: "Plan benefit description"
        data_type: VARCHAR
        tests:
          - not_null
      - name: email_support
        description: "Whether email support is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: live_chat
        description: "Whether live chat is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: phone_support
        description: "Whether phone support is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: api_access
        description: "Whether API access is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: custom_integrations
        description: "Whether custom integrations are included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: sla_guarantee
        description: "Whether SLA guarantee is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: total_features
        description: "Count of enabled features (from stg_benefit_features)"
        data_type: INTEGER
        tests:
          - not_null
      - name: processed_at
        description: "Timestamp when dbt processed this row (inherited from stg_plans)"
        data_type: TIMESTAMP
        tests:
          - not_null
