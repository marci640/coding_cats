version: 2

models:
  - name: stg_raw_data
    description: >
      Staged customer signup and subscription data.
      Adds a processed_at timestamp.
      Filter: Exclude rows where signup_date < '2025-01-01'.
      Source: raw_data seed.
    columns:
      - name: id
        description: "Unique customer identifier (Primary Key)"
        data_type: INTEGER
        tests:
          - unique
          - not_null
      - name: name
        description: "Customer full name"
        data_type: VARCHAR
        tests:
          - not_null
      - name: email
        description: "Customer email address (unique per customer)"
        data_type: VARCHAR
        tests:
          - unique
          - not_null
      - name: signup_date
        description: "Date the customer signed up (YYYY-MM-DD). Only rows >= 2025-01-01 are included."
        data_type: DATE
        tests:
          - not_null
      - name: plan_type
        description: "Subscription tier: basic, premium, or enterprise"
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              values: ['basic', 'premium', 'enterprise']
      - name: amount
        description: "Subscription amount in USD"
        data_type: "DECIMAL(10,2)"
        tests:
          - not_null
      - name: processed_at
        description: "Timestamp when dbt processed this row (CAST(CURRENT_TIMESTAMP AS TIMESTAMP))"
        data_type: TIMESTAMP
        tests:
          - not_null

  - name: stg_plans
    description: >
      Staged plan reference data.
      Adds a processed_at timestamp.
      Source: plans seed.
    columns:
      - name: plan_type
        description: "Subscription tier identifier (Primary Key): basic, premium, or enterprise"
        data_type: VARCHAR
        tests:
          - unique
          - not_null
          - accepted_values:
              values: ['basic', 'premium', 'enterprise']
      - name: amount
        description: "Plan list price in USD"
        data_type: "DECIMAL(10,2)"
        tests:
          - not_null
      - name: benefit
        description: "Plan benefit description"
        data_type: VARCHAR
        tests:
          - not_null
      - name: processed_at
        description: "Timestamp when dbt processed this row (CAST(CURRENT_TIMESTAMP AS TIMESTAMP))"
        data_type: TIMESTAMP
        tests:
          - not_null

  - name: stg_benefit_features
    description: >
      Staged benefit feature flags.
      Each row represents a benefit tier with boolean flags for available features.
      Adds total_features computed column and processed_at timestamp.
      Source: benefit_features seed.
    columns:
      - name: benefit
        description: "Benefit tier name (Primary Key). Joins to stg_plans.benefit."
        data_type: VARCHAR
        tests:
          - unique
          - not_null
      - name: email_support
        description: "Whether email support is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: live_chat
        description: "Whether live chat is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: phone_support
        description: "Whether phone support is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: api_access
        description: "Whether API access is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: custom_integrations
        description: "Whether custom integrations are included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: sla_guarantee
        description: "Whether SLA guarantee is included"
        data_type: BOOLEAN
        tests:
          - not_null
      - name: total_features
        description: "Count of enabled features (sum of all boolean flags cast to INT)"
        data_type: INTEGER
        tests:
          - not_null
      - name: processed_at
        description: "Timestamp when dbt processed this row (CAST(CURRENT_TIMESTAMP AS TIMESTAMP))"
        data_type: TIMESTAMP
        tests:
          - not_null

  - name: stg_diagnosis
    description: >
      Staged diagnosis data from SQL Server.
      Extracts raw diagnosis records from SQL Server dbo.diagnosis table.
      Adds a processed_at timestamp.
      Source: sql_server.dbo.diagnosis (MSSQL via DuckDB extension).
      Note: Column structure is a placeholder and must be verified against actual SQL Server schema.
    columns:
      - name: id
        description: "Unique diagnosis identifier (Primary Key)"
        data_type: INTEGER
        tests:
          - unique
          - not_null
      - name: processed_at
        description: "Timestamp when dbt processed this row (CAST(CURRENT_TIMESTAMP AS TIMESTAMP))"
        data_type: TIMESTAMP
        tests:
          - not_null
