version: 2

models:
  - name: stg_raw_data
    description: >
      Staged customer signup and subscription data.
      Adds a processed_at timestamp.
      Filter: Exclude rows where signup_date < '2025-01-01'.
      Source: raw_data seed.
    columns:
      - name: id
        description: "Unique customer identifier (Primary Key)"
        data_type: INTEGER
        tests:
          - unique
          - not_null
      - name: name
        description: "Customer full name"
        data_type: VARCHAR
        tests:
          - not_null
      - name: email
        description: "Customer email address (unique per customer)"
        data_type: VARCHAR
        tests:
          - unique
          - not_null
      - name: signup_date
        description: "Date the customer signed up (YYYY-MM-DD). Only rows >= 2025-01-01 are included."
        data_type: DATE
        tests:
          - not_null
      - name: plan_type
        description: "Subscription tier: basic, premium, or enterprise"
        data_type: VARCHAR
        tests:
          - not_null
          - accepted_values:
              values: ['basic', 'premium', 'enterprise']
      - name: amount
        description: "Subscription amount in USD"
        data_type: "DECIMAL(10,2)"
        tests:
          - not_null
      - name: processed_at
        description: "Timestamp when dbt processed this row (CAST(CURRENT_TIMESTAMP AS TIMESTAMP))"
        data_type: TIMESTAMP
        tests:
          - not_null
